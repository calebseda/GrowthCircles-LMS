<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrowthCircles · Youth Facilitator AI Mastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080C14;
  --bg2:       #0D1320;
  --bg3:       #121A2B;
  --panel:     #162035;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.13);
  --green:     #00E5A0;
  --green2:    #00C87A;
  --green-dim: rgba(0,229,160,0.12);
  --blue:      #4D9FFF;
  --blue-dim:  rgba(77,159,255,0.12);
  --gold:      #FFB840;
  --gold-dim:  rgba(255,184,64,0.12);
  --coral:     #FF6B5B;
  --coral-dim: rgba(255,107,91,0.12);
  --purple:    #A78BFA;
  --purple-dim:rgba(167,139,250,0.12);
  --text:      #E8EDF5;
  --text2:     #8B96A8;
  --text3:     #4A5568;
  --radius:    10px;
  /* Tracks */
  --gc:        #00E5A0;
  --ai:        #4D9FFF;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ─ Grain overlay ─ */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:999;opacity:0.4;
}

/* ─ Scrollbar ─ */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ══════════════════════════════════════════
   TOP BAR
══════════════════════════════════════════ */
.topbar{
  position:sticky;top:0;z-index:200;
  background:rgba(8,12,20,0.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  justify-content:space-between;
  padding:0 24px;height:56px;
  gap:16px;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-logo{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--green),var(--blue));
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--bg);
}
.brand-text{
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
  background:linear-gradient(90deg,var(--green),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.brand-sub{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;}

.topbar-stats{display:flex;align-items:center;gap:12px;}
.stat-chip{
  display:flex;align-items:center;gap:6px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;
  font-family:'JetBrains Mono',monospace;font-size:12px;
}
.stat-chip.xp{color:var(--gold);}
.stat-chip.streak{color:var(--coral);}
.stat-chip.level{color:var(--green);}
.chip-icon{font-size:13px;}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
.app{display:flex;min-height:calc(100vh - 56px);}

/* ─ Sidebar ─ */
.sidebar{
  width:260px;min-width:260px;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:56px;
  height:calc(100vh - 56px);
  overflow-y:auto;
}
.sidebar-section{padding:16px 12px 8px;}
.sidebar-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--text3);padding:0 8px;margin-bottom:8px;
}
.track-toggle{
  display:flex;gap:4px;
  background:var(--bg3);
  border-radius:8px;padding:4px;margin:0 4px 12px;
}
.track-btn{
  flex:1;padding:7px 8px;border:none;border-radius:6px;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all 0.2s;color:var(--text2);background:transparent;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.track-btn.gc.active{background:rgba(0,229,160,0.18);color:var(--gc);}
.track-btn.ai.active{background:rgba(77,159,255,0.18);color:var(--ai);}
.track-btn:hover{color:var(--text);}

.lesson-nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;
  cursor:pointer;transition:all 0.15s;
  margin-bottom:2px;position:relative;
}
.lesson-nav-item:hover{background:rgba(255,255,255,0.04);}
.lesson-nav-item.active{background:rgba(0,229,160,0.08);border-left:2px solid var(--gc);}
.lesson-nav-item.active.ai-track{background:rgba(77,159,255,0.08);border-left-color:var(--ai);}
.lesson-nav-item.locked{opacity:0.35;cursor:not-allowed;}
.nav-num{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--text3);min-width:18px;
}
.nav-title{font-size:12px;color:var(--text2);flex:1;line-height:1.3;}
.lesson-nav-item.active .nav-title{color:var(--text);}
.nav-icon{font-size:12px;}

.sidebar-xp-bar{
  margin:12px;border-radius:8px;
  background:var(--bg3);border:1px solid var(--border);
  padding:12px;
}
.xp-bar-label{
  display:flex;justify-content:space-between;
  font-size:11px;color:var(--text3);margin-bottom:6px;
  font-family:'JetBrains Mono',monospace;
}
.xp-bar-track{height:4px;background:var(--bg);border-radius:2px;}
.xp-bar-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--gc),var(--blue));
  transition:width 0.6s cubic-bezier(.4,0,.2,1);
}

/* ─ Main ─ */
.main{flex:1;padding:36px 44px;max-width:900px;}

/* ══════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════ */
.dashboard{animation:fadeUp 0.4s ease both;}

.dashboard-hero{
  border-radius:16px;overflow:hidden;
  background:linear-gradient(135deg,#0A1F35 0%,#071A2E 60%,#0D1F10 100%);
  border:1px solid var(--border);
  padding:44px 48px;margin-bottom:28px;
  position:relative;
}
.dashboard-hero::before{
  content:'';position:absolute;
  top:-60px;right:-60px;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,229,160,0.08) 0%,transparent 70%);
}
.dashboard-hero::after{
  content:'';position:absolute;
  bottom:-40px;left:20%;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(77,159,255,0.06) 0%,transparent 70%);
}
.hero-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--gc);margin-bottom:12px;
}
.hero-title{
  font-family:'Syne',sans-serif;
  font-size:40px;font-weight:800;
  line-height:1.1;margin-bottom:12px;
  color:var(--text);
}
.hero-title .gc{color:var(--gc);}
.hero-title .ai{color:var(--blue);}
.hero-sub{
  font-size:15px;color:var(--text2);
  line-height:1.7;max-width:520px;margin-bottom:28px;
}
.hero-cta-row{display:flex;gap:12px;flex-wrap:wrap;}

/* ─ Info cards grid ─ */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;}
.info-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:20px;
  position:relative;overflow:hidden;transition:border-color 0.2s;
}
.info-card:hover{border-color:var(--border2);}
.info-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.info-card.gc::before{background:linear-gradient(90deg,var(--gc),transparent);}
.info-card.ai::before{background:linear-gradient(90deg,var(--blue),transparent);}
.info-card.gold::before{background:linear-gradient(90deg,var(--gold),transparent);}
.ic-icon{font-size:24px;margin-bottom:10px;}
.ic-num{
  font-family:'Syne',sans-serif;font-size:32px;font-weight:800;
  margin-bottom:4px;
}
.ic-num.gc{color:var(--gc);}
.ic-num.ai{color:var(--blue);}
.ic-num.gold{color:var(--gold);}
.ic-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;}

/* ─ Track cards ─ */
.track-cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
.track-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:14px;padding:28px;cursor:pointer;
  transition:all 0.2s;position:relative;overflow:hidden;
}
.track-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.track-card.gc:hover{border-color:rgba(0,229,160,0.3);}
.track-card.ai:hover{border-color:rgba(77,159,255,0.3);}
.track-card-bg{
  position:absolute;top:-30px;right:-30px;
  font-size:100px;opacity:0.04;pointer-events:none;
}
.tc-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
  margin-bottom:8px;
}
.tc-label.gc{color:var(--gc);}
.tc-label.ai{color:var(--blue);}
.tc-title{
  font-family:'Syne',sans-serif;font-size:20px;font-weight:700;
  color:var(--text);margin-bottom:8px;
}
.tc-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px;}
.tc-progress{display:flex;align-items:center;gap:10px;}
.tc-prog-bar{flex:1;height:3px;background:var(--bg);border-radius:2px;}
.tc-prog-fill{height:100%;border-radius:2px;transition:width 0.6s;}
.gc .tc-prog-fill{background:var(--gc);}
.ai .tc-prog-fill{background:var(--blue);}
.tc-prog-text{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);white-space:nowrap;}

/* Badges showcase */
.badges-row{display:flex;gap:8px;flex-wrap:wrap;}
.badge-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:20px;
  font-size:12px;font-weight:500;
  border:1px solid;transition:all 0.2s;
}
.badge-chip.earned{
  background:rgba(255,184,64,0.1);
  border-color:rgba(255,184,64,0.3);color:var(--gold);
}
.badge-chip.locked{
  background:rgba(255,255,255,0.03);
  border-color:var(--border);color:var(--text3);
}

/* ══════════════════════════════════════════
   LESSON VIEW
══════════════════════════════════════════ */
.lesson-view{animation:fadeUp 0.35s ease both;}

.lesson-top{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:28px;gap:16px;
}
.lesson-track-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
  margin-bottom:6px;display:flex;align-items:center;gap:6px;
}
.lesson-track-tag.gc{color:var(--gc);}
.lesson-track-tag.ai{color:var(--blue);}
.lesson-title{
  font-family:'Syne',sans-serif;
  font-size:32px;font-weight:800;color:var(--text);
  line-height:1.15;
}
.lesson-meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.xp-tag{
  background:var(--gold-dim);border:1px solid rgba(255,184,64,0.25);
  color:var(--gold);border-radius:20px;padding:5px 14px;
  font-family:'JetBrains Mono',monospace;font-size:12px;white-space:nowrap;
}
.shield-tag{
  font-size:10px;color:var(--text3);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.08em;
}

/* Objective + example cards */
.l-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:22px 26px;margin-bottom:16px;
  position:relative;overflow:hidden;
}
.l-card-accent{
  position:absolute;left:0;top:0;bottom:0;
  width:3px;border-radius:3px 0 0 3px;
}
.l-card-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
  margin-bottom:8px;
}
.l-card-body{font-size:14px;color:var(--text2);line-height:1.7;}
.l-card-body strong{color:var(--text);}

/* Facilitator notes */
.fac-notes{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;padding:20px 24px;margin-bottom:16px;
}
.fac-notes-header{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
}
.fac-badge{
  background:rgba(167,139,250,0.15);
  border:1px solid rgba(167,139,250,0.3);
  color:var(--purple);border-radius:6px;
  padding:3px 10px;font-size:10px;
  font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;
}
.fac-item{
  display:flex;gap:10px;margin-bottom:8px;
  font-size:13px;color:var(--text2);line-height:1.6;
}
.fac-bullet{color:var(--purple);margin-top:2px;flex-shrink:0;}

/* Resources */
.resources-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.resource-chip{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:12px 14px;
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--text2);
}
.resource-icon{font-size:16px;flex-shrink:0;}

/* ─ Kolb system ─ */
.kolb-container{
  background:var(--panel);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;margin-bottom:16px;
}
.kolb-header{
  padding:18px 24px 0;
  border-bottom:1px solid var(--border);
}
.kolb-header-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--text3);margin-bottom:12px;
}
.kolb-tabs{display:flex;gap:2px;overflow-x:auto;}
.k-tab{
  padding:10px 14px;border:none;background:transparent;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;
  color:var(--text3);cursor:pointer;transition:all 0.2s;
  border-bottom:2px solid transparent;white-space:nowrap;
  display:flex;align-items:center;gap:5px;
}
.k-tab:hover{color:var(--text);}
.k-tab.active{color:var(--text);border-bottom-color:var(--green);}
.k-tab.active.ai-track{border-bottom-color:var(--blue);}
.k-tab.done{color:var(--green);}
.k-tab.done::after{content:'  ✓';font-size:10px;}
.k-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

.kolb-body{padding:24px;}
.kolb-stage{display:none;}
.kolb-stage.active{display:block;animation:fadeUp 0.3s ease both;}

.stage-header{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:20px;margin-bottom:16px;
}
.stage-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
  margin-bottom:6px;
}
.stage-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;}
.stage-prompt{font-size:13px;color:var(--text2);line-height:1.7;}

/* Response area */
.resp-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--text3);margin-bottom:6px;
}
textarea.resp-ta{
  width:100%;min-height:110px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:14px;
  font-family:'Outfit',sans-serif;font-size:14px;
  color:var(--text);resize:vertical;
  transition:border-color 0.2s;line-height:1.6;
}
textarea.resp-ta:focus{outline:none;border-color:rgba(0,229,160,0.4);}
textarea.resp-ta:focus.ai-track{border-color:rgba(77,159,255,0.4);}
textarea.resp-ta:read-only{opacity:0.7;cursor:default;}
.char-count{text-align:right;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-top:4px;}

/* Upload */
.upload-row{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px dashed var(--border);
  border-radius:8px;padding:10px 14px;
  cursor:pointer;transition:border-color 0.2s;
  margin:10px 0;font-size:12px;color:var(--text3);
}
.upload-row:hover{border-color:var(--border2);color:var(--text2);}
.upload-row input{display:none;}

/* AI coach bubble */
.ai-bubble{
  background:linear-gradient(135deg,rgba(0,229,160,0.06),rgba(77,159,255,0.06));
  border:1px solid rgba(0,229,160,0.2);
  border-radius:10px;padding:18px 20px;
  margin:12px 0;display:none;
  animation:fadeUp 0.3s ease both;
}
.ai-bubble.visible{display:block;}
.ai-bubble.ai-track{border-color:rgba(77,159,255,0.25);}
.ai-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ai-ava{
  width:26px;height:26px;border-radius:6px;
  background:linear-gradient(135deg,var(--gc),var(--blue));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--bg);
  font-family:'Syne',sans-serif;
}
.ai-coach-name{font-size:11px;font-weight:600;color:var(--gc);}
.ai-coach-name.ai-track{color:var(--blue);}
.ai-text{font-size:13px;color:var(--text2);line-height:1.75;}
.ai-text p{margin-bottom:8px;}
.ai-text p:last-child{margin-bottom:0;}

/* Gate result */
.gate-pill{
  display:inline-flex;align-items:center;gap:6px;
  border-radius:20px;padding:6px 14px;
  font-size:12px;font-weight:600;
  margin:8px 0;
}
.gate-pill.pass{background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.3);color:var(--gc);}
.gate-pill.retry{background:rgba(255,107,91,0.1);border:1px solid rgba(255,107,91,0.3);color:var(--coral);}

/* Assessment card */
.assessment-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:18px;margin-bottom:16px;
}
.assess-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--text3);margin-bottom:8px;
}
.assess-q{
  font-size:13px;color:var(--text);margin-bottom:10px;
  line-height:1.6;
}
textarea.assess-ta{
  width:100%;min-height:80px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:10px 12px;
  font-family:'Outfit',sans-serif;font-size:13px;
  color:var(--text);resize:vertical;line-height:1.6;
  transition:border-color 0.2s;
}
textarea.assess-ta:focus{outline:none;border-color:rgba(0,229,160,0.35);}

/* Peer feedback */
.peer-section{
  border-top:1px solid var(--border);
  padding-top:14px;margin-top:8px;
}
.peer-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
input.peer-inp{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:9px 12px;
  font-family:'Outfit',sans-serif;font-size:13px;color:var(--text);
  transition:border-color 0.2s;margin-bottom:6px;
}
input.peer-inp:focus{outline:none;border-color:var(--border2);}

/* ─ Buttons ─ */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:11px 20px;border:none;border-radius:8px;
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.18s;text-decoration:none;
}
.btn-gc{background:var(--gc);color:var(--bg);}
.btn-gc:hover{background:var(--green2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,229,160,0.3);}
.btn-ai{background:var(--blue);color:var(--bg);}
.btn-ai:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(77,159,255,0.3);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);}
.btn-gold{background:var(--gold);color:var(--bg);}
.btn-gold:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,184,64,0.3);}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none !important;box-shadow:none !important;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
.btn-full{width:100%;justify-content:center;}
.spinner{width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:var(--bg);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}

/* ─ Completion ─ */
.lesson-complete-card{
  background:linear-gradient(135deg,rgba(0,229,160,0.08),rgba(77,159,255,0.08));
  border:1px solid rgba(0,229,160,0.2);
  border-radius:12px;padding:28px;margin-bottom:16px;
  text-align:center;
}
.lc-icon{font-size:44px;margin-bottom:12px;}
.lc-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px;}
.lc-sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:20px;}
.xp-pop{
  background:var(--gold-dim);border:1px solid rgba(255,184,64,0.3);
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 20px;border-radius:20px;
  font-family:'JetBrains Mono',monospace;color:var(--gold);font-size:14px;
  animation:xpPop 0.5s cubic-bezier(.17,.67,.47,1.6) both;
}
@keyframes xpPop{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}

/* ─ Portfolio export ─ */
.portfolio-section{
  background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:22px;margin-bottom:16px;
}
.portfolio-note{
  font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:12px;
  font-family:'JetBrains Mono',monospace;
  background:var(--bg3);border-radius:6px;padding:10px 12px;
}

/* ─ Badge unlock toast ─ */
.badge-toast{
  position:fixed;top:70px;right:20px;z-index:500;
  background:var(--panel);border:1px solid rgba(255,184,64,0.4);
  border-radius:10px;padding:14px 18px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  animation:slideIn 0.4s cubic-bezier(.17,.67,.47,1.6) both;
  max-width:280px;
}
@keyframes slideIn{from{transform:translateX(100px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.toast-icon{font-size:24px;}
.toast-text strong{display:block;font-size:13px;color:var(--gold);margin-bottom:2px;}
.toast-text span{font-size:11px;color:var(--text3);}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
.typing-dot{display:inline-flex;gap:3px;vertical-align:middle;}
.typing-dot i{width:5px;height:5px;border-radius:50%;background:var(--gc);display:inline-block;animation:tdot 1.2s infinite ease-in-out;}
.typing-dot i:nth-child(2){animation-delay:0.2s;}
.typing-dot i:nth-child(3){animation-delay:0.4s;}
@keyframes tdot{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-4px);}}

/* Responsive */
@media(max-width:768px){
  .app{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:relative;top:0;}
  .main{padding:20px 16px;}
  .info-grid{grid-template-columns:1fr 1fr;}
  .track-cards{grid-template-columns:1fr;}
  .lesson-title{font-size:24px;}
  .resources-grid{grid-template-columns:1fr;}
}

// ══════════════════════════════════════════════════════════════════════════════
// AI SUBMIT + GATE
// ══════════════════════════════════════════════════════════════════════════════
async function submitStage(stage){
  const l=S.currentLesson;
  const resp=document.getElementById(`resp-${stage}`)?.value?.trim();
  if(!resp||resp.length<30){
    alert("Please write a substantive response — at least 3–4 sentences — before submitting.");return;
  }

  const btn=document.getElementById(`sbtn-${stage}`);
  if(btn){btn.disabled=true;btn.innerHTML=`<span class="spinner"></span> Coaching…`;}

  const aiBubble=document.getElementById(`ai-${stage}`);
  const aiMsg=document.getElementById(`aimsg-${stage}`);
  aiBubble.classList.add('visible');
  aiMsg.innerHTML=`<div class="typing-dot"><i></i><i></i><i></i></div> Analysing your response…`;

  if(!S.responses[l.id])S.responses[l.id]={};
  S.responses[l.id][stage]=resp;

  const priorCtx=KOLB_STAGES
    .filter(s=>s!==stage&&S.responses[l.id]?.[s])
    .map(s=>`${KOLB_META[s].label}: "${S.responses[l.id][s].substring(0,200)}…"`)
    .join('\n');

  const isAI=l.track==='ai';
  const sysPrompt=`You are a sharp, warm, intellectually rigorous AI coach for the GrowthCircles Youth Facilitator AI Mastery Programme. You coach young people (18–30 years old) who are preparing to facilitate leadership and AI literacy programmes for school leaders in East Africa.

Your coaching style: direct, respectful, specific. You quote back what learners actually wrote. You ask one question that genuinely deepens their thinking. You do not flatter or moralise.

Programme context: ${isAI?'Google AI Mastery track — building practical AI tool fluency':'GrowthCircles track — building facilitation identity and practice'}
Lesson: "${l.title}"
Kolb Stage: ${KOLB_META[stage].label} — "${l.kolb[stage].title}"
Prompt to learner: "${l.kolb[stage].q}"
${priorCtx?`Prior stage responses:\n${priorCtx}`:''}

COACHING RESPONSE FORMAT:
- 3–4 short paragraphs, max 180 words total
- Quote something specific they wrote in paragraph 1
- Push deeper in paragraph 2 — challenge an assumption or an incompleteness
- Ask ONE powerful follow-up question in paragraph 3
- Optional: brief connection to facilitation practice in paragraph 4

GATE ASSESSMENT (required, on its own line at the end):
GATE: PASS — if the response is substantive, specific, and shows genuine personal engagement (min 30 words, not generic)
GATE: RETRY — if vague, generic, too short, or clearly not from real experience`;

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:900,
        system:sysPrompt,
        messages:[{role:"user",content:`My ${KOLB_META[stage].label} response:\n\n"${resp}"`}]
      })
    });
    const data=await res.json();
    const full=data.content?.map(c=>c.type==='text'?c.text:'').join('').trim()||'';

    const gateMatch=full.match(/GATE:\s*(PASS|RETRY)/i);
    const gate=gateMatch?gateMatch[1].toUpperCase():'RETRY';
    const coaching=full.replace(/\n?GATE:\s*(PASS|RETRY)\s*$/i,'').trim();

    aiMsg.innerHTML=coaching.split('\n\n').filter(p=>p.trim())
      .map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');

    const gateEl=document.getElementById(`gate-${stage}`);
    if(gate==='PASS'){
      gateEl.innerHTML=`<div class="gate-pill pass">✓ Stage passed — well done</div>`;

      if(!S.stagesDone[l.id].includes(stage))S.stagesDone[l.id].push(stage);

      const ta=document.getElementById(`resp-${stage}`);
      if(ta)ta.readOnly=true;
      if(btn)btn.closest('.btn-row').innerHTML=`
        <div style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);border-radius:20px;">
          <span style="color:var(--gc)">✓</span>
          <span style="font-size:12px;color:var(--gc);font-family:'JetBrains Mono',monospace;">STAGE COMPLETE</span>
        </div>`;

      await saveState();

      const allDone=KOLB_STAGES.every(s=>S.stagesDone[l.id].includes(s));
      if(allDone){setTimeout(()=>renderLesson(),600);}
      else{
        const nextS=KOLB_STAGES[KOLB_STAGES.indexOf(stage)+1];
        if(nextS)setTimeout(()=>switchKolbStage(nextS),1400);
      }
    } else {
      gateEl.innerHTML=`<div class="gate-pill retry">↩ Read the coaching above and deepen your response</div>`;
      if(btn){btn.disabled=false;btn.innerHTML='Try Again';}
    }
  }catch(err){
    console.error(err);
    aiMsg.innerHTML=`<p>Coach temporarily unavailable. Your response is saved — try submitting again.</p>`;
    if(btn){btn.disabled=false;btn.innerHTML='Submit Response';}
  }
}

// LESSON COMPLETION + BADGE LOGIC
// ══════════════════════════════════════════════════════════════════════════════
function completeLesson(id){
  if(S.completed.includes(id))return;
  const l=LESSONS.find(ll=>ll.id===id);if(!l)return;
  S.completed.push(id);
  S.xp+=l.xp;

  // Unlock next in same track
  const sameTrack=LESSONS.filter(ll=>ll.track===l.track);
  const idx=sameTrack.findIndex(ll=>ll.id===id);
  if(idx<sameTrack.length-1){
    const nxt=sameTrack[idx+1];
    if(!S.unlocked.includes(nxt.id))S.unlocked.push(nxt.id);
  }

  // Streak update
  const today=new Date().toDateString();
  if(S.lastDate!==today){
    const yesterday=new Date(Date.now()-86400000).toDateString();
    S.streak=S.lastDate===yesterday?S.streak+1:1;
    S.lastDate=today;
  }

  // Badge checks
  checkBadges();

  saveState();
  renderTopBar();
  renderProgressBar();
  renderSidebar();
  renderLesson();
}

function checkBadges(){
  const prev=S.earnedBadges.length;
  const gcDone=n=>LESSONS.filter(l=>l.track==='gc'&&l.num<=n&&S.completed.includes(l.id)).length===n;
  const aiDone=n=>LESSONS.filter(l=>l.track==='ai'&&l.num<=n&&S.completed.includes(l.id)).length===n;

  if(gcDone(3)&&!S.earnedBadges.includes('foundations'))S.earnedBadges.push('foundations');
  if(aiDone(1)&&!S.earnedBadges.includes('firstbot'))S.earnedBadges.push('firstbot');
  if(gcDone(5)&&!S.earnedBadges.includes('coach'))S.earnedBadges.push('coach');
  if(aiDone(3)&&!S.earnedBadges.includes('gemini'))S.earnedBadges.push('gemini');
  if(gcDone(7)&&!S.earnedBadges.includes('architect'))S.earnedBadges.push('architect');
  if(aiDone(5)&&!S.earnedBadges.includes('notebooklm'))S.earnedBadges.push('notebooklm');
  if(S.completed.length===LESSONS.length&&!S.earnedBadges.includes('facilitator'))S.earnedBadges.push('facilitator');

  const newBadges=S.earnedBadges.slice(prev);
  newBadges.forEach(bid=>{
    const b=BADGES.find(x=>x.id===bid);
    if(b)showBadgeToast(b);
  });
}

function showBadgeToast(badge){
  const toast=document.createElement('div');
  toast.className='badge-toast';
  toast.innerHTML=`
    <span class="toast-icon">${badge.icon}</span>
    <div class="toast-text">
      <strong>Badge Unlocked!</strong>
      <span>${badge.name}</span>
    </div>`;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),4000);
}

// ══════════════════════════════════════════════════════════════════════════════
// PORTFOLIO EXPORT (KNQA compliance)
// ══════════════════════════════════════════════════════════════════════════════
function exportPortfolio(){
  let report=`GROWTHCIRCLES YOUTH FACILITATOR AI MASTERY PROGRAMME\nPORTFOLIO EVIDENCE REPORT\nGenerated: ${new Date().toLocaleString()}\n\n`;
  report+=`LEARNER SUMMARY\nTotal XP: ${S.xp}\nLessons Completed: ${S.completed.length}/${LESSONS.length}\nBadges Earned: ${S.earnedBadges.join(', ')||'None yet'}\nLevel: ${getLevel().name}\n\n`;
  report+='='+'='.repeat(60)+'\n\n';

  LESSONS.forEach(l=>{
    if(!S.completed.includes(l.id)&&!S.stagesDone[l.id]?.length)return;
    report+=`LESSON: ${l.id.toUpperCase()} — ${l.title}\nTrack: ${TRACKS[l.track].name} | Shield: ${l.shield} | XP: ${l.xp}\nStatus: ${S.completed.includes(l.id)?'COMPLETED':'IN PROGRESS'}\n\n`;

    KOLB_STAGES.forEach(s=>{
      const resp=S.responses[l.id]?.[s];
      const done=S.stagesDone[l.id]?.includes(s);
      if(resp){
        report+=`  Kolb Stage — ${KOLB_META[s].label} [${done?'PASSED — AI gate approved':'PENDING'}]\n`;
        report+=`  Prompt: "${l.kolb[s].q}"\n`;
        report+=`  Response: "${resp}"\n\n`;
      }
    });

    const assess=S.assessResponses[l.id];
    if(assess){
      report+=`  Assessment Response:\n  Q: "${l.assessment.q}"\n  A: "${assess}"\n\n`;
    }
    report+='-'.repeat(60)+'\n\n';
  });

  const blob=new Blob([report],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`GC_Portfolio_Evidence_${new Date().toISOString().split('T')[0]}.txt`;
  a.click();
}
