<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrowthCircles · Learning Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
                              from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
                              from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  // ── PASTE YOUR FIREBASE CONFIG (same as login.html) ─────────────────
  const firebaseConfig = {
    apiKey:            "PASTE_YOUR_API_KEY_HERE",
    authDomain:        "PASTE_YOUR_AUTH_DOMAIN_HERE",
    projectId:         "PASTE_YOUR_PROJECT_ID_HERE",
    storageBucket:     "PASTE_YOUR_STORAGE_BUCKET_HERE",
    messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID_HERE",
    appId:             "PASTE_YOUR_APP_ID_HERE"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let currentUID  = null;
  let saveTimeout = null;

  // ── 1. Auth guard — redirect if not logged in ────────────────────────
  onAuthStateChanged(auth, async user => {
    if (!user) {
      window.location.href = "login.html?next=learn.html";
      return;
    }
    currentUID = user.uid;
    showNav(user);
    await loadAndInjectState(user);
  });

  // ── 2. Load state from Firestore, inject into iframe ─────────────────
  async function loadAndInjectState(user) {
    showLoader(true);
    try {
      const ref  = doc(db, "learners", user.uid);
      const snap = await getDoc(ref);
      const data = snap.exists() ? snap.data() : {};
      const state = data.state || defaultState();

      // Pass the full state to the learning app via postMessage
      // The iframe is loaded first, then we send the state once it's ready
      showLoader(false);
      const frame = document.getElementById('learnFrame');

      frame.addEventListener('load', () => {
        // Small delay to ensure the app's message listener is registered
        setTimeout(() => {
          frame.contentWindow.postMessage({
            type:  'GC_INIT',
            uid:   user.uid,
            name:  user.displayName || "Learner",
            email: user.email,
            state: state
          }, '*');
        }, 300);
      }, { once: true });

      // Set the src now (triggers the load event above)
      // ┌─────────────────────────────────────────────────────────────────┐
      // │ OPTION A: iframe pointing to the standalone learning app HTML   │
      // │ Replace this URL with wherever you host the learning app:       │
      // │   - Same server: just 'gc_learning_app.html'                    │
      // │   - Subdomain:   'https://learn.growthcircles4rher.africa'      │
      // └─────────────────────────────────────────────────────────────────┘
      frame.src = 'gc_learning_app.html'; // ← change this path as needed

    } catch(e) {
      console.error('State load error:', e);
      showLoader(false);
    }
  }

  // ── 3. Listen for state-save messages from the learning app ──────────
  window.addEventListener('message', async (event) => {
    // Security: only accept messages from the same origin or your known domain
    // In production, replace '*' check with: if (event.origin !== 'https://learn.growthcircles4rher.africa') return;

    if (!event.data || !currentUID) return;

    if (event.data.type === 'GC_SAVE') {
      // Debounce saves — don't hammer Firestore on every keystroke
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(async () => {
        try {
          await setDoc(
            doc(db, "learners", currentUID),
            {
              state:     event.data.state,
              updatedAt: serverTimestamp()
            },
            { merge: true }
          );
        } catch(e) {
          console.error('State save error:', e);
        }
      }, 800); // wait 800ms after last message before saving
    }

    if (event.data.type === 'GC_EXPORT') {
      // Learning app is requesting a portfolio export — trigger download
      downloadPortfolio(event.data.reportText, event.data.learnerName);
    }

    if (event.data.type === 'GC_LESSON_COMPLETE') {
      // Flash the XP badge in the nav
      flashXP(event.data.xp);
    }
  });

  // ── 4. Portfolio download ─────────────────────────────────────────────
  function downloadPortfolio(text, name) {
    const blob = new Blob([text], { type: 'text/plain' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = `GC_Portfolio_${(name||'Learner').replace(/\s/g,'_')}_${new Date().toISOString().split('T')[0]}.txt`;
    a.click();
  }

  // ── 5. UI helpers ──────────────────────────────────────────────────────
  function showNav(user) {
    document.getElementById('navName').textContent = user.displayName?.split(' ')[0] || 'Learner';
    if (user.photoURL) {
      const img = document.getElementById('navAvatar');
      img.src   = user.photoURL; img.style.display = 'block';
      document.getElementById('navInitial').style.display = 'none';
    }
  }

  function showLoader(on) {
    document.getElementById('frameLoader').style.display = on ? 'flex' : 'none';
  }

  function flashXP(xp) {
    const el = document.getElementById('xpFlash');
    el.textContent = `+${xp} XP`;
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
    setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(-10px)'; }, 2000);
  }

  window.doSignOut = async function() {
    await signOut(auth);
    window.location.href = 'login.html';
  };

  function defaultState() {
    return {
      xp:0, streak:0, lastDate:null,
      completed:[], unlocked:["gc1","ai1"],
      stagesDone:{}, responses:{}, assessResponses:{},
      earnedBadges:[], currentTrack:"gc", currentLesson:null
    };
  }
</script>

<style>
:root{
  --bg:#080C14;--panel:#162035;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --green:#00E5A0;--blue:#4D9FFF;--gold:#FFB840;
  --text:#E8EDF5;--text2:#8B96A8;--text3:#4A5568;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);}

/* ── Nav ─────────────────────────────────────────────────── */
.nav{
  height:48px;background:rgba(8,12,20,0.95);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:relative;z-index:10;
}
.nav-left{display:flex;align-items:center;gap:8px;}
.nav-logo{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--bg);}
.nav-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;background:linear-gradient(90deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-link{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;transition:color 0.2s;text-decoration:none;}
.nav-link:hover{color:var(--text2);}
.nav-user{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:4px 10px 4px 5px;}
.nav-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--bg);font-family:'Syne',sans-serif;overflow:hidden;}
.nav-avatar img{width:100%;height:100%;object-fit:cover;display:none;}
.nav-name{font-size:11px;font-weight:600;color:var(--text);}

/* XP flash animation */
.xp-flash{
  position:fixed;top:60px;right:20px;z-index:999;
  background:rgba(255,184,64,0.15);border:1px solid rgba(255,184,64,0.3);
  color:var(--gold);font-family:'JetBrains Mono',monospace;
  font-size:14px;font-weight:500;
  padding:8px 16px;border-radius:20px;
  opacity:0;transform:translateY(-10px);
  transition:all 0.4s cubic-bezier(.17,.67,.47,1.3);
  pointer-events:none;
}

/* ── Frame container ─────────────────────────────────────── */
.frame-wrap{
  position:relative;
  height:calc(100vh - 48px);
  width:100%;
}
#learnFrame{
  width:100%;height:100%;border:none;display:block;
}

/* Loader overlay */
#frameLoader{
  position:absolute;inset:0;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;z-index:5;
}
.loader-ring{
  width:36px;height:36px;
  border:3px solid rgba(0,229,160,0.1);
  border-top-color:var(--green);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
.loader-text{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- Navigation -->
<nav class="nav">
  <div class="nav-left">
    <div class="nav-logo">G</div>
    <span class="nav-title">GrowthCircles · Learning Hub</span>
  </div>
  <div class="nav-right">
    <a href="dashboard.html" class="nav-link">← Dashboard</a>
    <div class="nav-user">
      <div class="nav-avatar">
        <img id="navAvatar" alt="">
        <span id="navInitial">L</span>
      </div>
      <span class="nav-name" id="navName">…</span>
    </div>
    <button class="nav-link" onclick="doSignOut()">Sign out</button>
  </div>
</nav>

<!-- XP flash notification -->
<div class="xp-flash" id="xpFlash"></div>

<!-- Iframe wrapper -->
<div class="frame-wrap">
  <div id="frameLoader">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading your learning hub…</div>
  </div>
  <!-- The learning app lives inside this iframe -->
  <iframe id="learnFrame" title="GrowthCircles Learning Hub"
          allow="clipboard-write;microphone"
          sandbox="allow-scripts allow-same-origin allow-forms allow-downloads allow-popups">
  </iframe>
</div>

</body>
<script src="/gc_bridge.js"></script>

</html>
