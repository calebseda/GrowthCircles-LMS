<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrowthCircles · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp }          from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup,
           signInWithEmailAndPassword, createUserWithEmailAndPassword,
           sendPasswordResetEmail, onAuthStateChanged, signOut,
           updateProfile }          from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp }
                                    from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyB42JUL-VMpitvXnfuxfVMDdC6iWEsaw70",
  authDomain: "growthcircles4her-bcdb2.firebaseapp.com",
  databaseURL: "https://growthcircles4her-bcdb2-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "growthcircles4her-bcdb2",
  storageBucket: "growthcircles4her-bcdb2.firebasestorage.app",
  messagingSenderId: "469369976466",
  appId: "1:469369976466:web:ee938d340227f5f4fc184b"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ── Redirect if already logged in ────────────────────────────────────
  onAuthStateChanged(auth, user => {
    if (user) {
      const redir = new URLSearchParams(window.location.search).get('next') || 'dashboard.html';
      window.location.href = redir;
    }
  });

  // ── Ensure learner profile doc exists in Firestore ───────────────────
  async function ensureProfile(user) {
    const ref  = doc(db, "learners", user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        profile: {
          name:       user.displayName || "Learner",
          email:      user.email,
          photoURL:   user.photoURL || null,
          createdAt:  serverTimestamp(),
          cohort:     null,      // set by admin when enrolling
          role:       "learner"  // learner | facilitator | moderator | admin
        },
        state: {
          xp:0, streak:0, lastDate:null,
          completed:[], unlocked:["gc1","ai1"],
          stagesDone:{}, responses:{}, assessResponses:{},
          earnedBadges:[], currentTrack:"gc"
        }
      });
    }
    return snap.exists() ? snap.data() : null;
  }

  // ── Google Sign-In ────────────────────────────────────────────────────
  window.signInGoogle = async function() {
    setLoading(true);
    try {
      const provider  = new GoogleAuthProvider();
      provider.setCustomParameters({ hd: "" }); // allow any domain
      const result    = await signInWithPopup(auth, provider);
      await ensureProfile(result.user);
      // onAuthStateChanged will redirect
    } catch(e) {
      showError(friendlyError(e.code));
      setLoading(false);
    }
  };

  // ── Email Sign-In ─────────────────────────────────────────────────────
  window.signInEmail = async function() {
    const email = document.getElementById('emailInput').value.trim();
    const pass  = document.getElementById('passInput').value;
    if (!email || !pass) { showError("Please enter your email and password."); return; }
    setLoading(true);
    try {
      const result = await signInWithEmailAndPassword(auth, email, pass);
      await ensureProfile(result.user);
    } catch(e) {
      showError(friendlyError(e.code));
      setLoading(false);
    }
  };

  // ── Register with Email ───────────────────────────────────────────────
  window.registerEmail = async function() {
    const name  = document.getElementById('nameInput').value.trim();
    const email = document.getElementById('emailInput').value.trim();
    const pass  = document.getElementById('passInput').value;
    const pass2 = document.getElementById('pass2Input').value;
    if (!name)           { showError("Please enter your full name."); return; }
    if (!email)          { showError("Please enter your email."); return; }
    if (pass.length < 6) { showError("Password must be at least 6 characters."); return; }
    if (pass !== pass2)  { showError("Passwords do not match."); return; }
    setLoading(true);
    try {
      const result = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(result.user, { displayName: name });
      await ensureProfile(result.user);
    } catch(e) {
      showError(friendlyError(e.code));
      setLoading(false);
    }
  };

  // ── Password Reset ────────────────────────────────────────────────────
  window.resetPassword = async function() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) { showError("Enter your email address first, then click Reset."); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showError("Reset link sent — check your inbox.", "success");
    } catch(e) {
      showError(friendlyError(e.code));
    }
  };

  // ── Helpers ───────────────────────────────────────────────────────────
  function friendlyError(code) {
    const map = {
      "auth/wrong-password":       "Incorrect password. Try again or reset it below.",
      "auth/user-not-found":       "No account found with that email.",
      "auth/email-already-in-use": "That email is already registered. Sign in instead.",
      "auth/weak-password":        "Password must be at least 6 characters.",
      "auth/invalid-email":        "Please enter a valid email address.",
      "auth/popup-closed-by-user": "Sign-in cancelled.",
      "auth/network-request-failed": "Network error. Check your connection.",
    };
    return map[code] || "Something went wrong. Please try again.";
  }

  function showError(msg, type="error") {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = "block";
    el.className = "error-msg " + type;
  }

  function setLoading(on) {
    document.getElementById('submitArea').style.opacity = on ? "0.5" : "1";
    document.getElementById('submitArea').style.pointerEvents = on ? "none" : "auto";
  }

  // ── Tab switching (sign-in vs register) ──────────────────────────────
  window.showTab = function(tab) {
    document.getElementById('signinTab').classList.toggle('active', tab==='signin');
    document.getElementById('registerTab').classList.toggle('active', tab==='register');
    document.getElementById('signinForm').style.display = tab==='signin' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab==='register' ? 'block' : 'none';
    document.getElementById('errorMsg').style.display = 'none';
  };
</script>

<style>
:root{
  --bg:#080C14;--panel:#162035;--border:rgba(255,255,255,0.08);
  --green:#00E5A0;--blue:#4D9FFF;--gold:#FFB840;--coral:#FF6B5B;
  --text:#E8EDF5;--text2:#8B96A8;--text3:#4A5568;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 60% at 10% 10%, rgba(0,229,160,0.05) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 90% 90%, rgba(77,159,255,0.05) 0%,transparent 60%);
}
.card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:20px;padding:40px 36px;width:100%;max-width:440px;
  position:relative;z-index:1;
  box-shadow:0 24px 64px rgba(0,0,0,0.4);
}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.logo{
  width:36px;height:36px;border-radius:9px;
  background:linear-gradient(135deg,var(--green),var(--blue));
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--bg);
}
.brand-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;
  background:linear-gradient(90deg,var(--green),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.brand-sub{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:0.08em;}

/* Tabs */
.tab-row{display:flex;background:rgba(255,255,255,0.04);border-radius:8px;padding:3px;margin-bottom:24px;}
.tab-btn{flex:1;padding:9px;border:none;background:transparent;
  color:var(--text3);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;
  border-radius:6px;cursor:pointer;transition:all 0.2s;}
.tab-btn.active{background:var(--panel);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,0.3);}

/* Google button */
.btn-google{
  width:100%;padding:13px;border:1px solid var(--border);background:rgba(255,255,255,0.04);
  border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;
}
.btn-google:hover{background:rgba(255,255,255,0.08);border-color:var(--border2,rgba(255,255,255,0.15));}
.google-icon{width:18px;height:18px;}

.divider{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;}

/* Inputs */
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;
  font-family:'JetBrains Mono',monospace;}
.field input{
  width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:8px;padding:12px 14px;
  font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);
  transition:border-color 0.2s;
}
.field input:focus{outline:none;border-color:rgba(0,229,160,0.4);}
.field input::placeholder{color:var(--text3);}

/* Submit button */
.btn-submit{
  width:100%;padding:14px;border:none;
  background:linear-gradient(135deg,var(--green),#00C87A);
  border-radius:10px;color:var(--bg);
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all 0.2s;margin-top:4px;
}
.btn-submit:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,229,160,0.35);}

/* Error / success */
.error-msg{
  display:none;padding:10px 14px;border-radius:8px;
  font-size:12px;margin-bottom:14px;line-height:1.5;
}
.error-msg.error{background:rgba(255,107,91,0.1);border:1px solid rgba(255,107,91,0.25);color:var(--coral);}
.error-msg.success{background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.25);color:var(--green);}

.reset-link{
  text-align:center;font-size:12px;color:var(--text3);
  margin-top:12px;cursor:pointer;
}
.reset-link span{color:var(--blue);text-decoration:underline;cursor:pointer;}
</style>
</head>
<body>

<div class="card">
  <div class="logo-row">
    <div class="logo">G</div>
    <div>
      <div class="brand-name">GrowthCircles</div>
      <div class="brand-sub">YOUTH FACILITATOR PROGRAMME</div>
    </div>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" id="signinTab" onclick="showTab('signin')">Sign In</button>
    <button class="tab-btn" id="registerTab" onclick="showTab('register')">Register</button>
  </div>

  <div id="errorMsg" class="error-msg"></div>

  <!-- ── Sign In Form ─────────────────────────────── -->
  <div id="signinForm">
    <button class="btn-google" onclick="signInGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><span>or sign in with email</span></div>

    <div id="submitArea">
      <div class="field">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="passInput" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')signInEmail()">
      </div>
      <button class="btn-submit" onclick="signInEmail()">Sign In</button>
    </div>
    <div class="reset-link">Forgot password? <span onclick="resetPassword()">Reset it</span></div>
  </div>

  <!-- ── Register Form ───────────────────────────── -->
  <div id="registerForm" style="display:none">
    <button class="btn-google" onclick="signInGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Register with Google
    </button>

    <div class="divider"><span>or create an account</span></div>

    <div id="submitArea">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="nameInput" placeholder="Your full name" autocomplete="name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="passInput" placeholder="At least 6 characters" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="pass2Input" placeholder="Repeat password"
          onkeydown="if(event.key==='Enter')registerEmail()">
      </div>
      <button class="btn-submit" onclick="registerEmail()">Create Account</button>
    </div>
  </div>
</div>

</body>
</html>
